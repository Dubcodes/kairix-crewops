services:
  app:
    build: .
    container_name: crewops-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      APP_NAME: ${APP_NAME:-Kairix CrewOps}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in the Portainer stack environment}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-720}
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in the Portainer stack environment}
      UPLOAD_DIR: /data/uploads
      BACKUP_DIR: /data/backups
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8088}
    ports:
      - "8088:8000"
    volumes:
      - crewops_uploads:/data/uploads
      - crewops_backups:/data/backups
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: crewops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crewops}
      POSTGRES_USER: ${POSTGRES_USER:-crewops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the Portainer stack environment}
    volumes:
      - crewops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crewops} -d ${POSTGRES_DB:-crewops}"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  crewops_postgres:
  crewops_uploads:
  crewops_backups:
