services:
  app:
    build: .
    container_name: crewops-app
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://crewops:change-me@db:5432/crewops}
      UPLOAD_DIR: /data/uploads
      BACKUP_DIR: /data/backups
    ports:
      - "8088:8000"
    volumes:
      - crewops_uploads:/data/uploads
      - crewops_backups:/data/backups
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    container_name: crewops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crewops}
      POSTGRES_USER: ${POSTGRES_USER:-crewops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - crewops_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crewops} -d ${POSTGRES_DB:-crewops}"]
      interval: 10s
      timeout: 5s
      retries: 8

volumes:
  crewops_postgres:
  crewops_uploads:
  crewops_backups:
