<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CrewOps</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar" id="sidebar">
        <div class="brand">
          <div class="brand-mark">C</div>
          <div>
            <strong id="brandName">CrewOps</strong>
            <span id="brandSub">Operations</span>
          </div>
        </div>
        <nav id="nav"></nav>
      </aside>

      <main class="shell">
        <header class="topbar">
            <button class="icon-button" id="toggleSidebar" title="Toggle sidebar" aria-label="Toggle sidebar"></button>
            <label class="sr-only" for="search">Search accessible records</label>
            <input id="search" class="search" aria-label="Search accessible records" />
            <div class="topbar-right">
              <div class="xp"><span id="xpFill"></span></div>
              <span id="levelLabel">Level 1</span>
            <button class="icon-button" id="notificationButton" title="Notifications" aria-label="Notifications"></button>
            <button class="icon-button" id="helpButton" title="Help" aria-label="Help"></button>
            <button class="icon-button" id="settingsButton" title="Settings" aria-label="Settings"></button>
            <button class="avatar" id="avatar">?</button>
          </div>
        </header>

        <section id="setupView" class="view hidden">
          <div class="panel narrow">
            <h1>Initial setup</h1>
            <form id="setupForm" class="stack">
              <label>Organisation name<input name="organisation_name" required /></label>
              <label>Short name<input name="organisation_short_name" required /></label>
              <label>Website URL<input name="website_url" /></label>
              <div class="split">
                <label>Country<input name="country" value="New Zealand" /></label>
                <label>Timezone<input name="timezone" value="Pacific/Auckland" /></label>
              </div>
              <div class="split">
                <label>Admin username<input name="admin_username" required /></label>
                <label>Admin email<input name="admin_email" required type="email" /></label>
              </div>
              <label>Admin display name<input name="admin_display_name" required /></label>
              <label>Admin password<input name="admin_password" required type="password" minlength="10" /></label>
              <label>Default regions<textarea name="default_regions"></textarea></label>
              <button class="primary" type="submit">Create organisation</button>
            </form>
          </div>
        </section>

        <section id="loginView" class="view hidden">
          <div class="panel narrow">
            <h1>Sign in</h1>
            <form id="loginForm" class="stack">
              <label>Username or email<input name="username" required /></label>
              <label>Password<input name="password" type="password" required /></label>
              <button class="primary" type="submit">Sign in</button>
            </form>
          </div>
        </section>

        <section id="dashboardView" class="view hidden">
          <div class="dashboard-head">
            <div>
              <h1 id="welcome">Dashboard</h1>
              <p id="subtitle">Today’s schedule, open work, updates, and records.</p>
            </div>
            <button class="primary" id="refresh">Refresh</button>
          </div>
          <div class="grid">
            <section class="panel calendar-panel">
              <div class="panel-title">
                <h2>Calendar</h2>
                <button id="quickEvent">New event</button>
              </div>
              <div id="calendarList" class="list"></div>
            </section>
            <section class="panel">
              <div class="panel-title">
                <h2>Tasks</h2>
                <button id="quickTask">New task</button>
              </div>
              <div id="taskList" class="list"></div>
            </section>
            <section class="panel">
              <div class="panel-title"><h2>Notifications</h2></div>
              <div id="notificationList" class="list"></div>
            </section>
            <section class="panel">
              <div class="panel-title"><h2>Announcements</h2></div>
              <div id="announcementList" class="list"></div>
            </section>
            <section class="panel">
              <div class="panel-title"><h2>Recent messages</h2></div>
              <div id="messageList" class="list"></div>
            </section>
            <section class="panel">
              <div class="panel-title"><h2>Progress</h2></div>
              <div id="progressCard" class="progress-card"></div>
            </section>
            <section class="panel">
              <div class="panel-title"><h2>Contacts</h2></div>
              <div id="contactList" class="list"></div>
            </section>
            <section class="panel wide">
              <div class="panel-title"><h2>Modules</h2></div>
              <div id="moduleGrid" class="module-grid"></div>
            </section>
          </div>
        </section>

        <section id="moduleView" class="view hidden">
          <div class="module-head">
            <div>
              <h1 id="moduleTitle">Module</h1>
              <p id="moduleSubtitle"></p>
            </div>
            <div id="moduleActions" class="actions"></div>
          </div>
          <div id="moduleContent"></div>
        </section>
      </main>
    </div>
    <button id="floatingMessages" class="floating-message" title="Messages" aria-label="Messages"></button>
    <div id="toast" class="toast hidden"></div>
    <script src="/static/app.js"></script>
  </body>
</html>
